<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>사진 보내고 견적받기 | 올집사</title><meta name="theme-color" content="#285f2f"><link rel="canonical" href="https://oljibsa.co.kr/contact.html">
<style>:root{--g:#285f2f;--cream:#f8f5ed;--line:#dedbd2;--text:#20261f;--muted:#687068}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif;color:var(--text);background:#f8f7f2;line-height:1.6;word-break:keep-all}.wrap{width:min(860px,calc(100% - 28px));margin:auto}.top{background:#fff;border-bottom:1px solid #eee}.bar{height:68px;display:flex;align-items:center;justify-content:space-between}.brand{font-size:26px;font-weight:900;color:var(--g);text-decoration:none}.back{color:var(--g);font-weight:850;text-decoration:none}.title{padding:42px 0;background:linear-gradient(135deg,#204f27,#437d43);color:#fff}.title h1{font-size:34px;margin:0 0 7px}.title p{margin:0;opacity:.87}.content{padding:28px 0 70px}.guide,.form{background:#fff;border:1px solid var(--line);border-radius:16px}.guide{padding:24px;margin-bottom:18px}.guide h2{margin-top:0;font-size:21px}.photos{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.photo{padding:13px 8px;border-radius:10px;background:var(--cream);text-align:center;font-size:12px}.photo b{display:block;color:var(--g);font-size:20px}.form{padding:28px}.price{padding:16px;border-radius:10px;background:var(--cream);font-size:14px;margin-bottom:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.field{margin-bottom:18px}.full{grid-column:1/-1}label{display:block;margin-bottom:7px;font-weight:850}label small{font-weight:500;color:var(--muted)}input,select,textarea{width:100%;padding:13px;border:1px solid #cdcec7;border-radius:9px;background:#fff;font:inherit}textarea{min-height:118px;resize:vertical}.checks{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.check{display:flex;align-items:center;gap:7px;padding:11px;border:1px solid var(--line);border-radius:9px;font-weight:650}.check input{width:auto}.agree{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:#555}.agree input{width:auto;margin-top:4px}.submit{width:100%;padding:17px;border:0;border-radius:10px;background:var(--g);color:#fff;font-size:17px;font-weight:900;cursor:pointer}.submit:disabled{opacity:.6}.note{font-size:13px;color:var(--muted);text-align:center}.error{display:none;margin:0 0 16px;padding:12px;border-radius:9px;background:#fff0ef;color:#a12e27;font-size:14px}@media(max-width:650px){.title{padding:30px 0}.title h1{font-size:28px}.photos{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.full{grid-column:auto}.checks{grid-template-columns:1fr}.form{padding:20px}}</style></head>
<body><header class="top"><div class="wrap bar"><a class="brand" href="/">올집사</a><a class="back" href="/">← 홈페이지</a></div></header><section class="title"><div class="wrap"><h1>📷 사진 보내고 견적받기</h1><p>사진 3~5장과 기본 정보를 남겨주시면 확인 후 연락드립니다.</p></div></section>
<main class="wrap content"><section class="guide"><h2>어떤 사진을 보내주세요?</h2><div class="photos"><div class="photo"><b>1</b>마당 전체 전경</div><div class="photo"><b>2</b>좌측과 우측</div><div class="photo"><b>3</b>잔디·잡초 근접</div><div class="photo"><b>4</b>진입로·장애물</div><div class="photo"><b>5</b>폐기물·적치물</div></div></section>
<form class="form" id="estimateForm" action="https://formsubmit.co/durydesign@gmail.com" method="POST" enctype="multipart/form-data">
<input type="hidden" name="_subject" value="[올집사 홈페이지] 새 견적 요청">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://oljibsa.co.kr/thanks.html">
<input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">
<div class="price"><b>가격 안내</b><br>기본 잔디관리 평당 1,000원 · 최소 작업금액 20,000원 · 기본 운임 10km 포함 · 초과 km당 2,000원</div><div id="formError" class="error"></div>
<div class="grid"><div class="field"><label for="name">이름 *</label><input id="name" name="이름" required maxlength="30" autocomplete="name" placeholder="성함"></div><div class="field"><label for="phone">연락처 *</label><input id="phone" name="연락처" required maxlength="20" inputmode="tel" autocomplete="tel" placeholder="010-0000-0000"></div>
<div class="field full"><label for="address">현장 주소 *</label><input id="address" name="현장주소" required maxlength="120" autocomplete="street-address" placeholder="양평군 ○○면 ○○리까지 적어주세요"></div><div class="field"><label for="area">대략적인 면적 <small>(모르면 비워도 됩니다)</small></label><input id="area" name="대략적인면적" maxlength="30" placeholder="예: 약 50평"></div><div class="field"><label for="date">희망 방문일</label><input id="date" name="희망방문일" type="date"></div>
<div class="field full"><label>원하는 작업 *</label><div class="checks"><label class="check"><input type="checkbox" name="원하는작업" value="기본 잔디관리">기본 잔디관리</label><label class="check"><input type="checkbox" name="원하는작업" value="제초관리">제초관리</label><label class="check"><input type="checkbox" name="원하는작업" value="생육관리">생육관리</label><label class="check"><input type="checkbox" name="원하는작업" value="부분복토">부분복토</label><label class="check"><input type="checkbox" name="원하는작업" value="여러 작업 묶음">여러 작업 묶음</label><label class="check"><input type="checkbox" name="원하는작업" value="사진 보고 추천">사진 보고 추천</label></div></div>
<div class="field full"><label for="photos">현장 사진 <small>(3~5장 권장, 최대 10장)</small></label><input id="photos" type="file" name="attachment" accept="image/jpeg,image/png,image/webp,image/heic,image/heif" multiple required></div><div class="field full"><label for="message">추가 요청사항</label><textarea id="message" name="추가요청사항" maxlength="1500" placeholder="잔디 높이, 경사, 주차 가능 여부, 반려동물 등 참고사항을 적어주세요."></textarea></div>
<div class="field full"><label class="agree"><input type="checkbox" name="개인정보수집동의" value="동의" required><span>견적 상담을 위해 이름·연락처·주소·사진을 수집하고, 상담 완료에 필요한 기간 동안 이용하는 것에 동의합니다. *</span></label></div></div>
<button id="submitBtn" class="submit" type="submit">사진과 견적 요청 보내기</button><p class="note">현재 전화 문의는 운영하지 않습니다. 접수 내용을 확인한 후 연락드립니다.<br>사진으로 1차 견적을 안내하며 현장 상태에 따라 최종 금액이 조정될 수 있습니다.</p></form></main>
<script>document.getElementById('estimateForm').addEventListener('submit',function(e){const err=document.getElementById('formError');const services=[...document.querySelectorAll('input[name="원하는작업"]:checked')];const files=document.getElementById('photos').files;if(!services.length){e.preventDefault();err.style.display='block';err.textContent='원하는 작업을 한 가지 이상 선택해 주세요.';err.scrollIntoView({behavior:'smooth',block:'center'});return}if(files.length<1||files.length>10){e.preventDefault();err.style.display='block';err.textContent='사진은 1장 이상, 최대 10장까지 첨부해 주세요.';err.scrollIntoView({behavior:'smooth',block:'center'});return}const total=[...files].reduce((sum,f)=>sum+f.size,0);if(total>20*1024*1024){e.preventDefault();err.style.display='block';err.textContent='첨부 사진 전체 용량은 20MB 이하로 줄여 주세요.';err.scrollIntoView({behavior:'smooth',block:'center'});return}if([...files].some(f=>!f.type.startsWith('image/'))){e.preventDefault();err.style.display='block';err.textContent='사진 파일만 첨부할 수 있습니다.';err.scrollIntoView({behavior:'smooth',block:'center'});return}err.style.display='none';const b=document.getElementById('submitBtn');b.disabled=true;b.textContent='전송 중입니다…'});</script></body></html>
