<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 신청 | 올집사</title>
<style>
  :root{--green-dark:#2F5233;--green-light:#EAF3E6;--text:#2A2A2A;--muted:#6B6B6B;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--text);background:#fafafa;}
  .wrap{max-width:560px;margin:0 auto;padding:24px 20px 60px;}
  a{color:var(--green-dark);}
  h1{font-size:22px;color:var(--green-dark);font-weight:800;margin-bottom:6px;}
  .sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
  fieldset{border:none;background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  legend{font-size:15px;font-weight:700;color:var(--green-dark);padding:0 4px;}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px;}
  label.req::after{content:" *";color:#c0392b;}
  input[type=text],input[type=tel],input[type=email],input[type=date],textarea,select{
    width:100%;padding:11px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;
  }
  textarea{min-height:80px;resize:vertical;}
  .radio-row,.check-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:6px;}
  .radio-row label,.check-row label{display:flex;align-items:center;gap:6px;font-weight:400;margin:0;font-size:13px;}
  .photo-item{margin-top:14px;padding:12px;border:1px dashed #ccc;border-radius:10px;}
  .photo-item .name{font-size:13px;font-weight:600;margin-bottom:4px;}
  .photo-item .desc{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .photo-item input[type=file]{width:100%;font-size:12px;}
  .thumb{margin-top:8px;max-width:100%;max-height:120px;border-radius:6px;display:none;}
  .consent{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--muted);margin-top:10px;}
  .consent input{margin-top:3px;}
  .submit-btn{width:100%;padding:16px;background:var(--green-dark);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;margin-top:8px;cursor:pointer;}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed;}
  .status-msg{text-align:center;font-size:13px;margin-top:12px;color:var(--muted);}
  .status-msg.error{color:#c0392b;}
  .back{display:inline-block;margin-bottom:16px;font-size:13px;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">&larr; 올집사 홈으로</a>
  <h1>사진으로 먼저 상담하기</h1>
  <p class="sub">현장 사진과 요청사항을 남겨주시면 확인 후 이메일로 견적을 안내드립니다.</p>

  <form id="inquiryForm">
    <fieldset>
      <legend>신청자 정보</legend>
      <label class="req">이름</label>
      <input type="text" name="name" required>

      <label class="req">전화번호</label>
      <input type="tel" name="phone" placeholder="010-0000-0000" required>

      <label class="req">이메일</label>
      <input type="email" name="email" required>

      <label class="req">현장 주소</label>
      <input type="text" name="address" placeholder="양평군 OO면 OO리" required>

      <label class="req">건물 구분</label>
      <div class="radio-row">
        <label><input type="radio" name="propertyType" value="전원주택" required> 전원주택</label>
        <label><input type="radio" name="propertyType" value="세컨하우스"> 세컨하우스</label>
        <label><input type="radio" name="propertyType" value="빈집"> 빈집</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>요청 내용</legend>
      <label class="req">원하는 작업</label>
      <div class="check-row">
        <label><input type="checkbox" name="workType" value="잔디깎기"> 잔디깎기</label>
        <label><input type="checkbox" name="workType" value="가지치기/전정"> 가지치기/전정</label>
        <label><input type="checkbox" name="workType" value="병해충 방제"> 병해충 방제</label>
        <label><input type="checkbox" name="workType" value="마당정리"> 마당정리</label>
        <label><input type="checkbox" name="workType" value="생활 소작업"> 생활 소작업</label>
        <label><input type="checkbox" name="workType" value="기타"> 기타</label>
      </div>

      <label class="req">상세 요청사항</label>
      <textarea name="details" placeholder="예: 마당 전체 잔디가 많이 자랐고, 진입로 쪽 가지치기도 필요합니다." required></textarea>

      <label class="req">희망 날짜</label>
      <input type="date" name="preferredDate" required>

      <label class="req">출입 가능 여부</label>
      <div class="radio-row">
        <label><input type="radio" name="access" value="상시 출입 가능" required> 상시 출입 가능</label>
        <label><input type="radio" name="access" value="사전 연락 필요"> 사전 연락 필요</label>
        <label><input type="radio" name="access" value="방문 시 동행"> 방문 시 동행</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>현장 사진</legend>
      <p class="desc" style="font-size:12px;color:var(--muted);">최소 1장 이상 첨부해주시면 견적이 더 정확해집니다.</p>

      <div class="photo-item">
        <div class="name">전체 정면</div>
        <input type="file" accept="image/*" data-key="photo_front">
        <img class="thumb">
      </div>
      <div class="photo-item">
        <div class="name">왼쪽</div>
        <input type="file" accept="image/*" data-key="photo_left">
        <img class="thumb">
      </div>
      <div class="photo-item">
        <div class="name">오른쪽</div>
        <input type="file" accept="image/*" data-key="photo_right">
        <img class="thumb">
      </div>
      <div class="photo-item">
        <div class="name">작업 범위 근접사진</div>
        <input type="file" accept="image/*" data-key="photo_closeup">
        <img class="thumb">
      </div>
      <div class="photo-item">
        <div class="name">폐기물·장애물 사진</div>
        <input type="file" accept="image/*" data-key="photo_obstacle">
        <img class="thumb">
      </div>
      <div class="photo-item">
        <div class="name">기타 참고사진</div>
        <input type="file" accept="image/*" data-key="photo_etc">
        <img class="thumb">
      </div>
    </fieldset>

    <fieldset>
      <label class="consent">
        <input type="checkbox" name="consent" required>
        <span>개인정보(이름, 연락처, 주소, 사진)를 상담 및 견적 목적으로 수집하는 데 동의합니다. 수집된 정보는 상담 완료 후 관련 법령에 따라 보관/파기됩니다.</span>
      </label>
    </fieldset>

    <button class="submit-btn" type="submit" id="submitBtn">사진 보내고 상담 신청</button>
    <div class="status-msg" id="statusMsg"></div>
  </form>
</div>

<script>
/* =========================================================
   배포 후 이 값을 실제 Apps Script 웹앱 URL로 교체하세요.
   (Apps Script 편집기 > 배포 > 웹 앱으로 배포 후 생성되는 URL)
   ========================================================= */
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzZ85rG3Kb-Cj_mXoXBg0M34IrTuH7YhvWoiaqgkpxkxfF8Yi2XK9bHykosX5bGKRdu2w/exec";

const form = document.getElementById('inquiryForm');
const submitBtn = document.getElementById('submitBtn');
const statusMsg = document.getElementById('statusMsg');

// 사진 미리보기 + 리사이즈용 캐시
const photoCache = {}; // key -> {filename, mimeType, base64}

document.querySelectorAll('input[type=file][data-key]').forEach(input => {
  input.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    const key = e.target.dataset.key;
    const thumb = e.target.parentElement.querySelector('.thumb');
    if (!file) { delete photoCache[key]; if(thumb) thumb.style.display='none'; return; }
    try {
      const resized = await resizeImageToBase64(file, 1600, 0.8);
      photoCache[key] = resized;
      if (thumb) {
        thumb.src = 'data:' + resized.mimeType + ';base64,' + resized.base64;
        thumb.style.display = 'block';
      }
    } catch (err) {
      console.error('이미지 처리 실패', err);
    }
  });
});

function resizeImageToBase64(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          else { width = Math.round(width * (maxDim / height)); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve({
          filename: (file.name || 'photo').replace(/\.[^/.]+$/, '') + '.jpg',
          mimeType: 'image/jpeg',
          base64: dataUrl.split(',')[1]
        });
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  statusMsg.textContent = '';
  statusMsg.className = 'status-msg';

  if (GAS_WEB_APP_URL.includes('YOUR_DEPLOYED_WEB_APP_URL_HERE')) {
    statusMsg.textContent = '아직 배포된 Apps Script 웹앱 URL이 연결되지 않았습니다. (관리자 설정 필요)';
    statusMsg.className = 'status-msg error';
    return;
  }

  const fd = new FormData(form);
  const workTypes = fd.getAll('workType');
  const payload = {
    name: fd.get('name'),
    phone: fd.get('phone'),
    email: fd.get('email'),
    address: fd.get('address'),
    propertyType: fd.get('propertyType'),
    workType: workTypes.join(', '),
    details: fd.get('details'),
    preferredDate: fd.get('preferredDate'),
    access: fd.get('access'),
    consent: !!fd.get('consent'),
    photos: photoCache,
    submittedAt: new Date().toISOString()
  };

  submitBtn.disabled = true;
  submitBtn.textContent = '전송 중...';

  try {
    const res = await fetch(GAS_WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // preflight(OPTIONS) 회피용
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    if (result.success) {
      window.location.href = 'thanks.html?id=' + encodeURIComponent(result.inquiryId);
    } else {
      throw new Error(result.error || '알 수 없는 오류');
    }
  } catch (err) {
    console.error(err);
    statusMsg.textContent = '전송에 실패했습니다. 잠시 후 다시 시도해주세요. (' + err.message + ')';
    statusMsg.className = 'status-msg error';
    submitBtn.disabled = false;
    submitBtn.textContent = '사진 보내고 상담 신청';
  }
});
</script>
</body>
</html>
