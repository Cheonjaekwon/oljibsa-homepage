<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>접수 완료 | 올집사</title>
<style>
  :root{--green-dark:#2F5233;--green-light:#EAF3E6;--muted:#6B6B6B;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--green-light);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:#fff;border-radius:18px;padding:40px 28px;max-width:420px;width:100%;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.06);}
  .check{width:60px;height:60px;border-radius:50%;background:var(--green-dark);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px;}
  h1{font-size:20px;color:var(--green-dark);font-weight:800;margin-bottom:10px;}
  .id-box{background:var(--green-light);border-radius:10px;padding:14px;margin:18px 0;font-size:15px;font-weight:700;color:var(--green-dark);}
  p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:8px;}
  .steps{text-align:left;background:#fafafa;border-radius:10px;padding:16px 18px;margin-top:20px;font-size:13px;color:#444;}
  .steps li{margin-bottom:6px;}
  a.home{display:inline-block;margin-top:24px;font-size:13px;color:var(--green-dark);font-weight:600;}
</style>
</head>
<body>
  <div class="card">
    <div class="check">&#10003;</div>
    <h1>상담 신청이 접수되었습니다</h1>
    <div class="id-box" id="idBox">접수번호 확인 중...</div>
    <p>보내주신 사진과 요청사항을 확인한 뒤,<br>입력하신 이메일로 견적을 안내드립니다.</p>
    <ol class="steps">
      <li>사진·현장 정보 확인 (영업일 기준 1~2일)</li>
      <li>견적 검토 및 이메일 발송</li>
      <li>일정 조율 후 작업 진행</li>
      <li>작업 전후 사진과 완료 보고</li>
    </ol>
    <a class="home" href="index.html">&larr; 올집사 홈으로 돌아가기</a>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  document.getElementById('idBox').textContent = id ? ('접수번호: ' + id) : '접수번호를 확인할 수 없습니다. 문의 시 신청 시간을 함께 알려주세요.';
</script>
</body>
</html>
